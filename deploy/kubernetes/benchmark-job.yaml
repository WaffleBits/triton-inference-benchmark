apiVersion: batch/v1
kind: Job
metadata:
  name: triton-inference-benchmark
  labels:
    app.kubernetes.io/name: triton-inference-benchmark
    app.kubernetes.io/component: benchmark
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: triton-inference-benchmark
        app.kubernetes.io/component: benchmark
    spec:
      restartPolicy: Never
      containers:
        - name: benchmark
          image: ghcr.io/wafflebits/triton-inference-benchmark:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--mode"
            - "triton"
            - "--server-url"
            - "triton.default.svc.cluster.local:8000"
            - "--model-name"
            - "resnet50_trt_fp16"
            - "--input-name"
            - "input"
            - "--input-shape"
            - "1,3,224,224"
            - "--num-requests"
            - "1000"
            - "--concurrency"
            - "32"
            - "--prometheus"
            - "--output-dir"
            - "/results"
          volumeMounts:
            - name: benchmark-results
              mountPath: /results
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: benchmark-results
          emptyDir: {}
