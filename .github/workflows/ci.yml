name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Benchmark harness tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run mock benchmark
        run: python benchmark.py --mode mock --num-requests 20 --concurrency 4 --output-dir benchmark_results

